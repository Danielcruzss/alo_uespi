services:
  mariadb:
    image: mariadb:11
    container_name: alo_uespi_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: alo_uespi
      MARIADB_USER: alo_user
      MARIADB_PASSWORD: alo_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
